version = 1
id = "monthly-harness-deep-audit"
kind = "cron"
name = "Monthly Harness Deep Audit"
prompt = "对当前安装了 Chilon 的 workspace 做一次月度深检。先运行 `python tools/auto_cold_layer_maintenance.py --mode monthly`，读取最新月度报告，再读 `AGENTS.md`、`PROJECT-WORKFLOW.md` 和 `.project-memory/` 的核心治理文件。接着运行 `python tools/check_harness.py`。至少抽查 3 个样例，覆盖 cases 与 drills。若报告显示需要收缩，优先处理重复、近义、过重或低频内容，只做可解释、可回退的结构治理。最后输出月度结论，包含总体判断、已处理问题、剩余风险、下月最该看的 1 到 2 个文件，默认中文。"
status = "ACTIVE"
rrule = "FREQ=MONTHLY;BYMONTHDAY=1;BYHOUR=10;BYMINUTE=0;BYSECOND=0"
model = "gpt-5.5"
reasoning_effort = "medium"
execution_environment = "local"
cwds = ["."]
